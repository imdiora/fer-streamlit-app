version: "3.8"

services:
  api:
    build: .
    command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  ui:
    build: .
    command: ["streamlit", "run", "app/ui.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api
